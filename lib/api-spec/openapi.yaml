openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IoT Water Quality Monitoring API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sensors
    description: Sensor nodes
  - name: readings
    description: Sensor readings
  - name: alerts
    description: Threshold alerts
  - name: dashboard
    description: Dashboard summary and trends
  - name: thresholds
    description: Safe threshold configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sensors:
    get:
      operationId: listSensors
      tags: [sensors]
      summary: List all sensor nodes
      responses:
        "200":
          description: List of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sensor"
    post:
      operationId: createSensor
      tags: [sensors]
      summary: Register a new sensor node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sensor"

  /sensors/{id}:
    get:
      operationId: getSensor
      tags: [sensors]
      summary: Get a sensor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sensor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sensor"
        "404":
          description: Not found
    patch:
      operationId: updateSensor
      tags: [sensors]
      summary: Update a sensor node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorUpdate"
      responses:
        "200":
          description: Updated sensor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sensor"
        "404":
          description: Not found
    delete:
      operationId: deleteSensor
      tags: [sensors]
      summary: Delete a sensor node
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /sensors/{id}/readings:
    get:
      operationId: listReadingsBySensor
      tags: [readings]
      summary: Get readings for a specific sensor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"

  /readings:
    get:
      operationId: listReadings
      tags: [readings]
      summary: List readings across all sensors
      parameters:
        - name: sensorId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"
    post:
      operationId: createReading
      tags: [readings]
      summary: Ingest a new sensor reading (called by ESP32)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reading"

  /readings/latest:
    get:
      operationId: getLatestReadings
      tags: [readings]
      summary: Get the most recent reading for each sensor
      responses:
        "200":
          description: Latest reading per sensor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all alerts
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: ["active", "acknowledged", "resolved", null]
        - name: severity
          in: query
          schema:
            type: ["string", "null"]
            enum: ["warning", "critical", null]
        - name: sensorId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Acknowledge or resolve an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overall system summary — sensor counts, alert counts, status
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/trends:
    get:
      operationId: getDashboardTrends
      tags: [dashboard]
      summary: Aggregated trend data for charts (hourly/daily averages)
      parameters:
        - name: sensorId
          in: query
          schema:
            type: ["integer", "null"]
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        "200":
          description: Trend data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /thresholds:
    get:
      operationId: listThresholds
      tags: [thresholds]
      summary: List all parameter thresholds
      responses:
        "200":
          description: List of thresholds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Threshold"

  /thresholds/{parameter}:
    patch:
      operationId: updateThreshold
      tags: [thresholds]
      summary: Update safe range for a parameter
      parameters:
        - name: parameter
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdUpdate"
      responses:
        "200":
          description: Updated threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Threshold"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Sensor:
      type: object
      required: [id, name, location, status, online, battery, signal, installedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [normal, warning, critical, offline]
        online:
          type: boolean
        battery:
          type: integer
          description: Battery percentage 0-100
        signal:
          type: integer
          description: Signal strength percentage 0-100
        lastReadingAt:
          type: ["string", "null"]
        installedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    SensorInput:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        battery:
          type: integer
        signal:
          type: integer

    SensorUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [normal, warning, critical, offline]
        online:
          type: boolean
        battery:
          type: integer
        signal:
          type: integer

    Reading:
      type: object
      required: [id, sensorId, ph, tds, turbidity, temperature, ec, orp, recordedAt]
      properties:
        id:
          type: integer
        sensorId:
          type: integer
        ph:
          type: number
        tds:
          type: number
          description: Total Dissolved Solids in mg/L
        turbidity:
          type: number
          description: Turbidity in NTU
        temperature:
          type: number
          description: Temperature in Celsius
        ec:
          type: number
          description: Electrical Conductivity in µS/cm
        orp:
          type: number
          description: Oxidation-Reduction Potential in mV
        recordedAt:
          type: string

    ReadingInput:
      type: object
      required: [sensorId, ph, tds, turbidity, temperature, ec, orp]
      properties:
        sensorId:
          type: integer
        ph:
          type: number
        tds:
          type: number
        turbidity:
          type: number
        temperature:
          type: number
        ec:
          type: number
        orp:
          type: number

    Alert:
      type: object
      required: [id, sensorId, sensorName, parameter, value, threshold, severity, status, message, triggeredAt]
      properties:
        id:
          type: integer
        sensorId:
          type: integer
        sensorName:
          type: string
        parameter:
          type: string
        value:
          type: string
        threshold:
          type: string
        severity:
          type: string
          enum: [warning, critical]
        status:
          type: string
          enum: [active, acknowledged, resolved]
        message:
          type: string
        triggeredAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    AlertUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [acknowledged, resolved]

    DashboardSummary:
      type: object
      required: [totalSensors, onlineSensors, offlineSensors, activeAlerts, criticalAlerts, warningAlerts, overallStatus]
      properties:
        totalSensors:
          type: integer
        onlineSensors:
          type: integer
        offlineSensors:
          type: integer
        activeAlerts:
          type: integer
        criticalAlerts:
          type: integer
        warningAlerts:
          type: integer
        overallStatus:
          type: string
          enum: [safe, at_risk, critical]

    TrendPoint:
      type: object
      required: [label, ph, tds, turbidity, temperature, ec, orp]
      properties:
        label:
          type: string
        ph:
          type: number
        tds:
          type: number
        turbidity:
          type: number
        temperature:
          type: number
        ec:
          type: number
        orp:
          type: number

    Threshold:
      type: object
      required: [id, parameter, unit, minValue, maxValue]
      properties:
        id:
          type: integer
        parameter:
          type: string
        unit:
          type: string
        minValue:
          type: ["number", "null"]
        maxValue:
          type: ["number", "null"]
        updatedAt:
          type: string

    ThresholdUpdate:
      type: object
      properties:
        minValue:
          type: ["number", "null"]
        maxValue:
          type: ["number", "null"]
