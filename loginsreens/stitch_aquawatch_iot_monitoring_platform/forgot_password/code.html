<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AquaWatch | Forgot Password</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Outfit & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#0c1322",
                    "secondary-fixed-dim": "#ffb95f",
                    "on-secondary-container": "#5b3800",
                    "secondary-container": "#ee9800",
                    "on-primary": "#002a78",
                    "on-secondary": "#472a00",
                    "on-tertiary-fixed-variant": "#930013",
                    "on-primary-container": "#eeefff",
                    "tertiary": "#ffb3ad",
                    "on-tertiary-container": "#ffecea",
                    "on-tertiary": "#68000a",
                    "inverse-primary": "#0053db",
                    "surface-container-lowest": "#070e1d",
                    "surface-container-high": "#232a3a",
                    "on-surface-variant": "#c3c6d7",
                    "surface-container": "#191f2f",
                    "on-error": "#690005",
                    "outline-variant": "#434655",
                    "secondary-fixed": "#ffddb8",
                    "on-surface": "#dce2f7",
                    "tertiary-container": "#cf2c30",
                    "error-container": "#93000a",
                    "surface-dim": "#0c1322",
                    "background": "#0c1322",
                    "surface-container-low": "#141b2b",
                    "surface-tint": "#b4c5ff",
                    "tertiary-fixed": "#ffdad7",
                    "surface-container-highest": "#2e3545",
                    "on-primary-fixed": "#00174b",
                    "outline": "#8d90a0",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed": "#410004",
                    "on-secondary-fixed-variant": "#653e00",
                    "inverse-surface": "#dce2f7",
                    "surface-variant": "#2e3545",
                    "surface-bright": "#323949",
                    "primary-container": "#2563eb",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary-fixed": "#2a1700",
                    "primary-fixed": "#dbe1ff",
                    "on-error-container": "#ffdad6",
                    "on-background": "#dce2f7",
                    "primary": "#b4c5ff",
                    "inverse-on-surface": "#293040",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "secondary": "#ffb95f",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "desktop-max-width": "1600px",
                    "container-padding": "32px",
                    "card-gap": "20px",
                    "gutter": "24px",
                    "unit": "4px",
                    "section-margin": "48px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "display-lg": ["Outfit"],
                    "body-sm": ["Inter"],
                    "headline-sm": ["Outfit"],
                    "body-md": ["Inter"],
                    "headline-md": ["Outfit"],
                    "body-lg": ["Inter"],
                    "mono-data": ["monospace"],
                    "headline-lg": ["Outfit"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0c1322;
            color: #dce2f7;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-button:hover {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
        }
        .pulsing-glow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.05); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl bg-surface-container/60 backdrop-blur-lg shadow-[0_0_20px_rgba(37,99,235,0.1)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-desktop-max-width mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="waves">waves</span>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">AquaWatch</span>
</div>
<!-- Desktop Nav Hidden for Recovery Screen to focus on task -->
<div class="hidden md:flex items-center gap-8">
<a class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors duration-200 font-label-md text-label-md" href="#">Support</a>
<a class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors duration-200 font-label-md text-label-md" href="#">Status</a>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex items-center justify-center px-4 relative pt-16 pb-20 overflow-hidden">
<!-- Ambient Background Glows -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pulsing-glow"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-secondary/5 rounded-full blur-[100px] pulsing-glow" style="animation-delay: 2s;"></div>
<!-- Forgot Password Card -->
<div class="w-full max-w-md glass-card rounded-xl p-8 md:p-10 relative z-10 shadow-2xl">
<!-- Recovery Icon -->
<div class="flex justify-center mb-8">
<div class="w-20 h-20 rounded-full bg-surface-container-highest flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.15)]">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lock_reset" style="font-variation-settings: 'wght' 300;">lock_reset</span>
</div>
</div>
<!-- Header Text -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg mb-3 text-on-surface tracking-tight">Forgot Password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    Enter your email address below and we'll send you a secure link to reset your access.
                </p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault(); alert('Reset link sent!');">
<div class="space-y-2">
<label class="block font-label-md text-label-md text-primary ml-1 uppercase tracking-widest opacity-80" for="email">Recovery Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors duration-200" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 focus:bg-surface-container transition-all duration-200 font-body-md outline-none" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-headline-sm text-headline-sm font-semibold active:scale-95 transition-all duration-150 glow-button flex items-center justify-center gap-3" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Back to Login -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
<span>Back to login</span>
</a>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-high/90 dark:bg-surface-container-high/90 backdrop-blur-2xl bg-surface-container-highest/50 shadow-[0_-4px_20px_rgba(0,0,0,0.4)] rounded-t-xl">
<!-- Active item: lock_reset (closest match for Forgot Password screen) -->
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span class="font-label-md text-label-md mt-1">Login</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-label-md text-label-md mt-1">Join</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
<span class="font-label-md text-label-md mt-1">Help</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-3 shadow-[0_0_15px_rgba(37,99,235,0.3)] scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
<span class="font-label-md text-label-md mt-1">Reset</span>
</a>
</nav>
<!-- Micro-interaction for input field atmospheric focus -->
<script>
        const input = document.getElementById('email');
        const card = document.querySelector('.glass-card');

        input.addEventListener('focus', () => {
            card.classList.add('shadow-[0_0_40px_rgba(37,99,235,0.1)]');
            card.style.borderColor = 'rgba(37, 99, 235, 0.2)';
        });

        input.addEventListener('blur', () => {
            card.classList.remove('shadow-[0_0_40px_rgba(37,99,235,0.1)]');
            card.style.borderColor = 'rgba(255, 255, 255, 0.05)';
        });
    </script>
</body></html>
