<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<nav class="fixed top-0 z-50 w-full bg-surface/80 dark:bg-surface/80 backdrop-blur-xl shadow-[0_0_20px_rgba(37,99,235,0.1)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-desktop-max-width mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="waves">waves</span>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">AquaWatch</span>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="font-label-md text-label-md text-primary font-semibold transition-colors duration-200" href="#">Dashboard</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary-fixed-dim transition-colors duration-200" href="#">Sensors</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary-fixed-dim transition-colors duration-200" href="#">Reports</a>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center relative px-4 py-24">
<!-- Atmospheric Background Shader Placeholder -->

<!-- Login Card -->
<div class="glass-card w-full max-w-md p-8 rounded-xl z-10 relative shadow-2xl">
<div class="mb-8 text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Monitoring global aquatic health in real-time.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant px-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full bg-surface-container border-none text-on-surface rounded-lg py-3 pl-10 pr-4 input-focus-glow transition-all font-body-md" id="email" placeholder="name@agency.gov" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-surface-container border-none text-on-surface rounded-lg py-3 pl-10 pr-4 input-focus-glow transition-all font-body-md" id="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline hover:text-on-surface transition-colors">visibility</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-4 pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-3 rounded-lg btn-glow active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                    </button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-md text-label-md uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-surface-container-highest text-on-surface font-headline-sm text-headline-sm py-3 rounded-lg hover:bg-surface-bright transition-all active:scale-95 flex items-center justify-center gap-2" type="button">
                        Create an Account
                    </button>
</div>
</form>
<!-- Bottom Disclaimer -->
<p class="mt-8 text-center font-body-sm text-body-sm text-outline px-4">
                Authorized personnel only. All access and activity is logged and monitored.
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-high/90 dark:bg-surface-container-high/90 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.4)] md:hidden">
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-3 shadow-[0_0_15px_rgba(37,99,235,0.3)] scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</a>
<a class="flex flex-col items-center justify-center text-outline p-3 hover:bg-surface-bright/20 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="lock_reset">lock_reset</span>
</a>
</nav>
<script>
        // Micro-interactions for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Floating particles background effect
        const createParticle = () => {
            const particle = document.createElement('div');
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.background = 'rgba(180, 197, 255, 0.2)';
            particle.style.borderRadius = '50%';
            particle.style.position = 'fixed';
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = '110vh';
            particle.style.zIndex = '0';
            particle.style.pointerEvents = 'none';
            particle.style.filter = 'blur(1px)';
            
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0 },
                { transform: `translateY(-120vh) scale(1.5)`, opacity: 0.6, offset: 0.5 },
                { transform: `translateY(-140vh) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 10000 + 10000,
                easing: 'linear'
            });

            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 1000);
    </script>
